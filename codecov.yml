coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
    patch:
      default:
        target: auto
        threshold: 1%

ignore:
  - "examples/**"
  - "tests/**"
  - "build/**"
  - "build-*/**"

comment:
  layout: "reach,diff,flags,files,footer"
  behavior: default
  require_changes: false
